<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>La Red Soberana - Fondo Generativo</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/p5.js/1.9.0/p5.min.js"></script>
    <style>
        * { margin: 0; padding: 0; }
        body { overflow: hidden; background: #0D0D0D; }
        canvas { display: block; }
        .controls {
            position: fixed;
            top: 20px;
            right: 20px;
            z-index: 10;
            display: flex;
            flex-direction: column;
            gap: 10px;
        }
        .btn {
            padding: 12px 24px;
            font-size: 14px;
            font-weight: 600;
            border: none;
            cursor: pointer;
            border-radius: 6px;
            font-family: system-ui, sans-serif;
            transition: transform 0.1s;
        }
        .btn:active { transform: scale(0.97); }
        .btn-record {
            background: #C5A059;
            color: #0F1115;
        }
        .btn-record.recording {
            background: #F43F5E;
            color: #fff;
            animation: pulse 1s infinite;
        }
        .btn-hide {
            background: rgba(255,255,255,0.1);
            color: #A3A3A3;
            font-size: 12px;
        }
        .status {
            color: #10B981;
            font-size: 12px;
            font-family: system-ui, sans-serif;
            text-align: right;
        }
        @keyframes pulse {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.7; }
        }
        .hidden { display: none !important; }
        .info {
            position: fixed;
            bottom: 20px;
            left: 20px;
            z-index: 10;
            color: #A3A3A3;
            font-family: system-ui, sans-serif;
            font-size: 12px;
        }
    </style>
</head>
<body>
    <div class="controls" id="controls">
        <button class="btn btn-record" id="recordBtn" onclick="toggleRecord()">GRABAR 10s PARA CAPCUT</button>
        <button class="btn btn-hide" onclick="document.getElementById('controls').classList.add('hidden'); document.getElementById('info').classList.add('hidden');">OCULTAR UI (grabar limpio)</button>
        <div class="status" id="status"></div>
    </div>
    <div class="info" id="info">
        La Red Soberana — Dark Mode Luxury<br>
        80 nodos dorados con conexiones dinámicas
    </div>

<script>
// === p5.js Sketch: La Red Soberana ===
let particles = [];
const numParticles = 80;
const connectionDist = 120;

function setup() {
    createCanvas(windowWidth, windowHeight);
    for (let i = 0; i < numParticles; i++) {
        particles.push(new Particle());
    }
}

function draw() {
    background(13, 13, 13);

    for (let i = 0; i < particles.length; i++) {
        particles[i].update();
        particles[i].show();

        for (let j = i + 1; j < particles.length; j++) {
            let d = dist(particles[i].x, particles[i].y, particles[j].x, particles[j].y);
            if (d < connectionDist) {
                let alpha = map(d, 0, connectionDist, 150, 0);
                stroke(245, 197, 24, alpha);
                strokeWeight(1);
                line(particles[i].x, particles[i].y, particles[j].x, particles[j].y);
            }
        }
    }
}

class Particle {
    constructor() {
        this.x = random(width);
        this.y = random(height);
        this.vx = random(-0.5, 0.5);
        this.vy = random(-0.5, 0.5);
        this.size = random(2, 4);
    }

    update() {
        this.x += this.vx;
        this.y += this.vy;
        if (this.x < 0 || this.x > width) this.vx *= -1;
        if (this.y < 0 || this.y > height) this.vy *= -1;
    }

    show() {
        noStroke();
        fill(245, 197, 24, 200);
        circle(this.x, this.y, this.size);
    }
}

function windowResized() {
    resizeCanvas(windowWidth, windowHeight);
}

// === Grabación WebM para CapCut ===
let mediaRecorder;
let recordedChunks = [];
let isRecording = false;

function toggleRecord() {
    if (isRecording) {
        stopRecord();
    } else {
        startRecord();
    }
}

function startRecord() {
    const canvas = document.querySelector('canvas');
    const stream = canvas.captureStream(30); // 30 FPS
    recordedChunks = [];

    mediaRecorder = new MediaRecorder(stream, {
        mimeType: 'video/webm;codecs=vp9',
        videoBitsPerSecond: 8000000 // 8 Mbps para calidad alta
    });

    mediaRecorder.ondataavailable = (e) => {
        if (e.data.size > 0) recordedChunks.push(e.data);
    };

    mediaRecorder.onstop = () => {
        const blob = new Blob(recordedChunks, { type: 'video/webm' });
        const url = URL.createObjectURL(blob);
        const a = document.createElement('a');
        a.href = url;
        a.download = 'red-soberana-fondo.webm';
        a.click();
        URL.revokeObjectURL(url);
        document.getElementById('status').textContent = 'Descargado. Importa en CapCut.';
        setTimeout(() => { document.getElementById('status').textContent = ''; }, 4000);
    };

    mediaRecorder.start();
    isRecording = true;

    const btn = document.getElementById('recordBtn');
    btn.textContent = 'DETENER GRABACIÓN';
    btn.classList.add('recording');
    document.getElementById('status').textContent = 'Grabando...';

    // Auto-stop a los 10 segundos
    setTimeout(() => {
        if (isRecording) stopRecord();
    }, 10000);
}

function stopRecord() {
    mediaRecorder.stop();
    isRecording = false;

    const btn = document.getElementById('recordBtn');
    btn.textContent = 'GRABAR 10s PARA CAPCUT';
    btn.classList.remove('recording');
    document.getElementById('status').textContent = 'Procesando...';
}
</script>
</body>
</html>
