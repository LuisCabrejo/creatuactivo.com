<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>Riser de Tensión - Campaign Assets</title>
    <style>
        body {
            background: #0F1115;
            color: #E5E5E5;
            font-family: system-ui, sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            gap: 20px;
            margin: 0;
        }
        h1 { color: #C5A059; font-size: 24px; margin-bottom: 10px; }
        p { color: #A3A3A3; font-size: 14px; max-width: 400px; text-align: center; }
        .btn {
            padding: 16px 32px;
            font-size: 18px;
            font-weight: 600;
            border: none;
            cursor: pointer;
            border-radius: 8px;
            transition: transform 0.1s;
        }
        .btn:active { transform: scale(0.97); }
        .btn-play {
            background: #1A1D23;
            color: #C5A059;
            border: 1px solid rgba(197, 160, 89, 0.3);
        }
        .btn-download {
            background: #C5A059;
            color: #0F1115;
        }
        .status {
            color: #10B981;
            font-size: 14px;
            min-height: 20px;
        }
    </style>
</head>
<body>
    <h1>RISER DE TENSIÓN</h1>
    <p>Sawtooth riser 40Hz → 800Hz con filtro lowpass y corte abrupto. Duración: 6 segundos.</p>
    <button class="btn btn-play" onclick="playRiser()">ESCUCHAR</button>
    <button class="btn btn-download" onclick="downloadRiser()">DESCARGAR .WAV PARA CAPCUT</button>
    <div class="status" id="status"></div>

<script>
const sampleRate = 44100;
const duration = 6;

// Renderiza el riser offline y retorna el AudioBuffer
function renderRiser() {
    const offlineCtx = new OfflineAudioContext(1, sampleRate * duration, sampleRate);

    const osc = offlineCtx.createOscillator();
    const gainNode = offlineCtx.createGain();
    const filter = offlineCtx.createBiquadFilter();

    osc.type = 'sawtooth';
    filter.type = 'lowpass';

    osc.connect(filter);
    filter.connect(gainNode);
    gainNode.connect(offlineCtx.destination);

    const now = 0;

    // Pitch: 40Hz → 800Hz
    osc.frequency.setValueAtTime(40, now);
    osc.frequency.exponentialRampToValueAtTime(800, now + duration);

    // Filtro: 100Hz → 5000Hz
    filter.frequency.setValueAtTime(100, now);
    filter.frequency.linearRampToValueAtTime(5000, now + duration);

    // Volumen: fade in + corte abrupto
    gainNode.gain.setValueAtTime(0, now);
    gainNode.gain.linearRampToValueAtTime(0.5, now + duration - 0.1);
    gainNode.gain.setValueAtTime(0, now + duration);

    osc.start(now);
    osc.stop(now + duration);

    return offlineCtx.startRendering();
}

// Escuchar en el navegador
async function playRiser() {
    const status = document.getElementById('status');
    status.textContent = 'Reproduciendo...';
    const audioCtx = new (window.AudioContext || window.webkitAudioContext)();
    const buffer = await renderRiser();

    // Copiar buffer al contexto online
    const onlineBuffer = audioCtx.createBuffer(1, buffer.length, sampleRate);
    onlineBuffer.copyToChannel(buffer.getChannelData(0), 0);

    const source = audioCtx.createBufferSource();
    source.buffer = onlineBuffer;
    source.connect(audioCtx.destination);
    source.start();
    source.onended = () => { status.textContent = ''; };
}

// Convertir AudioBuffer a WAV y descargar
async function downloadRiser() {
    const status = document.getElementById('status');
    status.textContent = 'Generando WAV...';

    const buffer = await renderRiser();
    const wavBlob = audioBufferToWav(buffer);

    const url = URL.createObjectURL(wavBlob);
    const a = document.createElement('a');
    a.href = url;
    a.download = 'riser-tension-6s.wav';
    a.click();
    URL.revokeObjectURL(url);

    status.textContent = 'Descargado. Importa el .wav en CapCut.';
    setTimeout(() => { status.textContent = ''; }, 4000);
}

// Encoder WAV (PCM 16-bit)
function audioBufferToWav(buffer) {
    const numChannels = 1;
    const length = buffer.length;
    const bitsPerSample = 16;
    const byteRate = sampleRate * numChannels * (bitsPerSample / 8);
    const blockAlign = numChannels * (bitsPerSample / 8);
    const dataSize = length * numChannels * (bitsPerSample / 8);
    const headerSize = 44;
    const arrayBuffer = new ArrayBuffer(headerSize + dataSize);
    const view = new DataView(arrayBuffer);

    // RIFF header
    writeString(view, 0, 'RIFF');
    view.setUint32(4, 36 + dataSize, true);
    writeString(view, 8, 'WAVE');

    // fmt chunk
    writeString(view, 12, 'fmt ');
    view.setUint32(16, 16, true);
    view.setUint16(20, 1, true); // PCM
    view.setUint16(22, numChannels, true);
    view.setUint32(24, sampleRate, true);
    view.setUint32(28, byteRate, true);
    view.setUint16(32, blockAlign, true);
    view.setUint16(34, bitsPerSample, true);

    // data chunk
    writeString(view, 36, 'data');
    view.setUint32(40, dataSize, true);

    const channelData = buffer.getChannelData(0);
    let offset = 44;
    for (let i = 0; i < length; i++) {
        const sample = Math.max(-1, Math.min(1, channelData[i]));
        view.setInt16(offset, sample * 0x7FFF, true);
        offset += 2;
    }

    return new Blob([arrayBuffer], { type: 'audio/wav' });
}

function writeString(view, offset, str) {
    for (let i = 0; i < str.length; i++) {
        view.setUint8(offset + i, str.charCodeAt(i));
    }
}
</script>
</body>
</html>
